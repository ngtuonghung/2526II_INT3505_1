openapi: 3.0.3
info:
  title: Payment API Versioning Demo
  version: 1.0.0
  description: Demo URL versioning and lifecycle management with deprecation headers.
servers:
  - url: http://localhost:5000
paths:
  /api/v1/payments:
    post:
      tags:
        - v1
      summary: Create payment using v1 format
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentV1"
      responses:
        "201":
          description: Payment created with v1 response format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentV1"
  /api/v1/payments/{id}:
    get:
      tags:
        - v1
      summary: Get payment using v1 format
      deprecated: true
      parameters:
        - $ref: "#/components/parameters/PaymentId"
      responses:
        "200":
          description: Payment found. Response includes deprecation headers.
          headers:
            Deprecation:
              description: Marks this version as deprecated.
              schema:
                type: string
                example: "true"
            Warning:
              description: Human-readable warning that v1 is deprecated and has a planned removal date.
              schema:
                type: string
                example: 299 - "API v1 is deprecated and will be removed on 2026-12-31. Please migrate to /api/v2/payments"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentV1"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v2/payments:
    post:
      tags:
        - v2
      summary: Create payment using v2 format
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentV2"
      responses:
        "201":
          description: Payment created with v2 response format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentV2"
  /api/v2/payments/{id}:
    get:
      tags:
        - v2
      summary: Get payment using v2 format
      parameters:
        - $ref: "#/components/parameters/PaymentId"
      responses:
        "200":
          description: Payment found without deprecation headers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentV2"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  parameters:
    PaymentId:
      name: id
      in: path
      required: true
      schema:
        type: string
      example: pay_1
  responses:
    NotFound:
      description: Payment not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    CreatePaymentV1:
      type: object
      required:
        - amount
      properties:
        amount:
          type: string
          example: "100.00"
        description:
          type: string
          example: Book order
    PaymentV1:
      type: object
      properties:
        id:
          type: string
          example: pay_1
        amount:
          type: string
          example: "100.00"
        description:
          type: string
          example: Book order
        status:
          type: string
          example: created
    CreatePaymentV2:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: number
          format: float
          example: 100.0
        currency:
          type: string
          example: USD
        description:
          type: string
          example: Book order
        idempotency_key:
          type: string
          example: abc-123
    PaymentV2:
      type: object
      properties:
        id:
          type: string
          example: pay_1
        amount:
          type: number
          format: float
          example: 100.0
        currency:
          type: string
          example: USD
        description:
          type: string
          example: Book order
        status:
          type: string
          example: created
        idempotency_key:
          type: string
          nullable: true
          example: abc-123
    Error:
      type: object
      properties:
        error:
          type: string
          example: Payment not found
