<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes – Sign in</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Hidden until auth check completes to prevent flash -->
  <div class="login-backdrop" id="login-page" style="display:none">
    <div class="login-card">
      <h1>Notes</h1>
      <p class="login-subtitle">Sign in to continue</p>
      <form id="login-form">
        <input type="text"     id="login-username" placeholder="Username" autocomplete="username" required />
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required />
        <p class="login-error" id="login-error"></p>
        <button type="submit">Sign in</button>
      </form>
    </div>
  </div>

  <script>
    const API      = 'http://127.0.0.1:5000';
    const AUTH_API = `${API}/auth`;
    const ACCESS_TOKEN_KEY = 'access_token';

    const loginPage  = document.getElementById('login-page');
    const loginForm  = document.getElementById('login-form');
    const loginError = document.getElementById('login-error');

    // Decode JWT payload and check exp without verifying signature.
    function isTokenValid(token) {
      if (!token) return false;
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        return payload.exp * 1000 > Date.now();
      } catch {
        return false;
      }
    }

    // Redirect to dashboard only if the access token stored in this tab session
    // is still valid. Do NOT auto-redirect based on the refresh token.
    function checkSession() {
      const token = sessionStorage.getItem(ACCESS_TOKEN_KEY);
      if (isTokenValid(token)) {
        window.location.replace('dashboard.html');
      } else {
        loginPage.style.display = 'flex';
      }
    }

    loginForm.addEventListener('submit', async e => {
      e.preventDefault();
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      loginError.textContent = '';

      const res = await fetch(`${AUTH_API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ username, password }),
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        loginError.textContent = data.error || 'Login failed';
        return;
      }

      const { access_token } = await res.json();
      sessionStorage.setItem(ACCESS_TOKEN_KEY, access_token);
      window.location.href = 'dashboard.html';
    });

    checkSession();
  </script>
</body>
</html>
